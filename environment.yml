# ─────────────────────────────────────────────────────────────────────────────
# DroPhenix  |  environment.yml  (v2.0  –  April 2026)
# Create:   conda env create -f environment.yml
# Update:   conda env update -f environment.yml --prune
# Activate: conda activate drophenix
# ─────────────────────────────────────────────────────────────────────────────

name: drophenix
channels:
  - conda-forge          # primary — most packages
  - defaults             # fallback

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────
  - python>=3.10,<3.13

  # ── Core data science ────────────────────────────────────────────────────
  - numpy>=1.26,<3
  - pandas>=2.0,<3
  - scipy>=1.11,<2
  - scikit-learn>=1.4,<2
  - scikit-image>=0.21,<1

  # ── Visualisation ────────────────────────────────────────────────────────
  - plotly>=5.18,<7

  # ── Computer vision ──────────────────────────────────────────────────────
  - opencv>=4.9              # conda-forge: provides cv2, headless-safe

  # ── Cheminformatics ──────────────────────────────────────────────────────
  - rdkit>=2023.9            # conda-forge only — do NOT install via pip

  # ── File I/O ─────────────────────────────────────────────────────────────
  - openpyxl>=3.1,<4
  - pdfplumber>=0.10,<1

  # ── Figure export (publication PNG/SVG from Plotly) ──────────────────────
  - kaleido>=0.2             # required for fig.write_image()

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip
  - pip:
    - streamlit>=1.32.0,<2.0.0
    - streamlit-webrtc>=0.47.0
    - av>=11.0.0              # PyAV — video decode for webrtc

# ─────────────────────────────────────────────────────────────────────────────
# NOTES
# ─────────────────────────────────────────────────────────────────────────────
# kaleido is REQUIRED for the DroPhenix "Download Publication Figure (PNG/SVG)"
# button to work.  Without it, fig.write_image() raises a ValueError.
#
# streamlit and streamlit-webrtc are installed via pip because their
# conda-forge packages sometimes lag behind PyPI releases.
#
# To install in an HPC/cluster environment without internet:
#   conda env create -f environment.yml --offline
#   (Requires pre-downloaded package cache via conda-pack or similar)
# ─────────────────────────────────────────────────────────────────────────────
